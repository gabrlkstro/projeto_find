{% load static %}

<link rel="stylesheet" href="{% static 'mainpage/css/edit_profile.css' %}" />

<!-- MODAL EDITAR PERFIL -->
<div
  class="modal fade edit-profile-modal"
  id="modalEditarPerfil"
  tabindex="-1"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow-lg">
      <!-- HEADER -->
      <div class="modal-header border-0" style="color: #0B3A4A;">
        <h5 class="modal-title fw-bold">Editar Perfil</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <!-- FORM -->
      <form
        action="{% url 'update_profile' %}"
        method="POST"
        enctype="multipart/form-data"
      >
        {% csrf_token %}

        <div class="modal-body">
          <!-- FOTO -->
          <div class="text-center mb-4">
            <div class="position-relative d-inline-block">
              <img
                src="{% if user.profile.image %}{{ user.profile.image.url }}{% else %}{% static 'mainpage/img/user.webp' %}{% endif %}"
                class="rounded-circle border border-3 border-info shadow-sm edit-profile-avatar"
                onerror="this.onerror=null; this.src='{% static 'mainpage/img/user.webp' %}';"
              />

              <div class="mt-2">
                <label
                  for="file-upload"
                  class="btn btn-sm btn-outline-primary rounded-pill px-3 edit-profile-upload-label"
                >
                  Alterar Foto
                </label>
                <input id="file-upload" type="file" name="image" hidden />
              </div>
            </div>
          </div>

          <!-- NOME E SOBRENOME -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold small text-muted text-uppercase">
                Nome
              </label>
              <input
                type="text"
                name="first_name"
                class="form-control border-info-subtle shadow-sm edit-profile-input"
                value="{{ user.first_name }}"
                required
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold small text-muted text-uppercase">
                Sobrenome
              </label>
              <input
                type="text"
                name="last_name"
                class="form-control border-info-subtle shadow-sm edit-profile-input"
                value="{{ user.last_name }}"
                required
              />
            </div>
          </div>

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label fw-bold small text-muted text-uppercase">
              E-mail
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light border-info-subtle">
                <i class="bi bi-lock-fill text-muted"></i>
              </span>
              <input
                type="email"
                class="form-control bg-light text-muted border-info-subtle edit-profile-input-readonly"
                value="{{ user.email }}"
                readonly
              />
            </div>
            <small class="form-text text-muted edit-profile-hint">
              O e-mail não pode ser alterado por segurança.
            </small>
          </div>

          <!-- TELEFONE -->
          <div class="mb-3">
            <label class="form-label fw-bold small text-muted text-uppercase">
              Telefone / WhatsApp
            </label>
            <input
              type="text"
              name="telefone"
              id="telefone_mask"
              class="form-control border-info-subtle shadow-sm edit-profile-input"
              placeholder="(00) 00000-0000"
              value="{{ user.profile.telefone|default:'' }}"
            />
          </div>

          <!-- ENDEREÇO -->
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold small text-muted text-uppercase">
                CEP
              </label>
              <input
                type="text"
                id="cep"
                name="cep"
                class="form-control border-info-subtle edit-profile-cep"
                placeholder="00000-000"
                maxlength="9"
                value="{{ user.profile.cep|default:'' }}"
              />
            </div>

            <div class="col-md-5 mb-3">
              <label class="form-label fw-bold small text-muted text-uppercase">
                Cidade
              </label>
              <input
                type="text"
                id="cidade"
                name="cidade"
                class="form-control border-info-subtle edit-profile-cidade"
                value="{{ user.profile.cidade|default:'' }}"
              />
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold small text-muted text-uppercase">
                UF
              </label>
              <input
                type="text"
                id="estado"
                name="estado"
                class="form-control border-info-subtle text-center edit-profile-estado"
                value="{{ user.profile.estado|default:'' }}"
                maxlength="2"
              />
            </div>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer border-0">
          <button
            type="button"
            class="btn btn-light px-4 fw-semibold edit-profile-btn-cancel"
            data-bs-dismiss="modal"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="btn px-4 fw-bold shadow edit-profile-btn-save"
          >
            Salvar Alterações
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById("cep").addEventListener("blur", function () {
    let cep = this.value.replace(/\D/g, "");

    if (cep.length !== 8) {
      return;
    }

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
      .then((response) => response.json())
      .then((data) => {
        if (!data.erro) {
          document.getElementById("cidade").value = data.localidade;
          document.getElementById("estado").value = data.uf;
        }
      })
      .catch(() => {
        console.log("Erro ao buscar CEP");
      });
  });

  document.getElementById("cep").addEventListener("input", function () {
    let value = this.value.replace(/\D/g, "");
    if (value.length > 5) {
      this.value = value.slice(0, 5) + "-" + value.slice(5, 8);
    } else {
      this.value = value;
    }
  });
</script>
