{% extends 'base.html' %} {% load static %} {% block title %}Excluir Item -
FIND{% endblock %} {% block content %}
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
/>
<link
  rel="stylesheet"
  href="{% static 'mainpage/css/item_confirm_delete.css' %}"
/>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 confirm-delete-card">
        <!-- HEADER -->
        <div class="modal-header border-0 confirm-delete-header">
          <h5 class="modal-title fw-bold confirm-delete-title">
            <i class="bi bi-trash3-fill me-2"></i>Excluir Item
          </h5>
        </div>

        <!-- BODY -->
        <div class="modal-body confirm-delete-body">
          <div class="mb-3">
            <i
              class="bi bi-exclamation-triangle-fill text-danger confirm-delete-icon"
            ></i>
          </div>
          <p class="fw-semibold mb-2">Tem certeza que deseja excluir o item:</p>
          <p class="confirm-delete-item-name mb-1">{{ item.titulo }}</p>
          <small class="text-muted">Essa ação não poderá ser desfeita.</small>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer border-0 confirm-delete-footer">
          <a
            href="{{ next|default:request.META.HTTP_REFERER|default:'/' }}"
            class="btn btn-light px-4 fw-semibold confirm-delete-btn-cancel"
          >
            <i class="bi bi-x-lg me-1"></i> Cancelar
          </a>

          <form
            method="post"
            action="{% url 'item_delete' item.id %}"
            class="d-inline"
          >
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}" />
            <button
              type="submit"
              class="btn fw-bold shadow confirm-delete-btn-delete"
            >
              <i class="bi bi-trash3-fill me-1"></i> Excluir
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
