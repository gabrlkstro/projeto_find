{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Find - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'mainpage/css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <link rel="icon" type="image/png" href="{% static 'mainpage/img/find.png' %}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow-none login-card" role="main">

        <!-- Logo -->
        <div class="image-logo text-center mb-3">
            <img src="{% static 'mainpage/img/logo-find.png' %}"
                 alt="Find – página inicial"
                 class="mx-auto d-block"
                 style="width: 140px; height: auto;">
        </div>

        <hr class="hr-custom" aria-hidden="true">

        <h1 class="text-center title-gradient mb-4" style="font-size:1.6rem;">Entrar na sua conta</h1>

        <!-- Alerta de erro do Django -->
        {% if messages %}
            {% for message in messages %}
                {% if 'error' in message.tags %}
                    <div class="alert alert-danger"
                         role="alert"
                         aria-live="assertive"
                         aria-atomic="true"
                         id="django-error-alert">
                        <span class="alert-icon" aria-hidden="true">error</span>
                        <span>{{ message }}</span>
                    </div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <!-- Formulário -->
        <form method="post" id="login-form" novalidate>
            {% csrf_token %}

            <!-- Usuário -->
            <div class="field-wrapper">
                <label for="id_username" class="field-label">Usuário ou email</label>
                <div class="input-group" id="group-username">
                    <span class="input-group-text border-0 bg-transparent" aria-hidden="true">
                        <span class="material-symbols-rounded">person</span>
                    </span>
                    <input type="text"
                           id="id_username"
                           name="username"
                           class="form-control"
                           placeholder="seu@email.com"
                           autocomplete="username"
                           autocapitalize="none"
                           spellcheck="false"
                           autofocus
                           required
                           aria-required="true"
                           aria-describedby="error-username">
                </div>
                <span id="error-username" class="field-error-msg" style="display:none;" role="alert"></span>
            </div>

            <!-- Senha -->
            <div class="field-wrapper">
                <label for="id_password" class="field-label">Senha</label>
                <div class="input-group" id="group-password">
                    <span class="input-group-text border-0 bg-transparent" aria-hidden="true">
                        <span class="material-symbols-rounded">lock</span>
                    </span>
                    <input type="password"
                           id="id_password"
                           name="password"
                           class="form-control"
                           placeholder="Sua senha"
                           autocomplete="current-password"
                           required
                           aria-required="true"
                           aria-describedby="error-password">
                    <!-- Toggle mostrar/ocultar senha -->
                    <button type="button"
                            class="btn-toggle-password"
                            id="toggle-password"
                            aria-label="Mostrar senha"
                            aria-pressed="false"
                            tabindex="0">
                        <span class="material-symbols-rounded" id="toggle-icon" aria-hidden="true">visibility</span>
                    </button>
                </div>
                <span id="error-password" class="field-error-msg" style="display:none;" role="alert"></span>
            </div>

            <p class="small-password">
                Esqueceu a senha?
                <a href="{% url 'password_reset' %}" class="small-password-link">Redefinir</a>
            </p>

            <!-- Botão submit -->
            <button class="btn btn-primary w-100 mt-1"
                    type="submit"
                    id="btn-submit"
                    aria-label="Entrar na conta">
                <span class="btn-text">ENTRAR</span>
                <span class="btn-spinner" aria-hidden="true">
                    <span class="spinner-dot"></span>
                    <span class="spinner-dot"></span>
                    <span class="spinner-dot"></span>
                </span>
            </button>

            <p class="small-password-register text-center">
                Não tem uma conta?
                <a href="{% url 'register' %}" class="small-password-link">Cadastre-se</a>
            </p>

        </form>
    </div>
</div>

<script>
(function () {
    'use strict';

    /* ── Elementos ── */
    const form       = document.getElementById('login-form');
    const btnSubmit  = document.getElementById('btn-submit');
    const usernameInput = document.getElementById('id_username');
    const passwordInput = document.getElementById('id_password');
    const toggleBtn  = document.getElementById('toggle-password');
    const toggleIcon = document.getElementById('toggle-icon');
    const groupUser  = document.getElementById('group-username');
    const groupPass  = document.getElementById('group-password');
    const errUser    = document.getElementById('error-username');
    const errPass    = document.getElementById('error-password');

    /* ── Auto-dismiss do alerta Django após 5s ── */
    const djangoAlert = document.getElementById('django-error-alert');
    if (djangoAlert) {
        // Marca inputs como erro se veio mensagem do servidor
        [groupUser, groupPass].forEach(g => g.classList.add('input-error'));

        setTimeout(() => {
            djangoAlert.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            djangoAlert.style.opacity = '0';
            djangoAlert.style.transform = 'translateX(-50%) translateY(-8px)';
            setTimeout(() => djangoAlert.remove(), 400);
        }, 5000);
    }

    /* ── Toggle mostrar/ocultar senha ── */
    toggleBtn.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        toggleIcon.textContent = isHidden ? 'visibility_off' : 'visibility';
        toggleBtn.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');
        toggleBtn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
        passwordInput.focus();
    });

    /* ── Limpa erro ao digitar ── */
    function clearError(group, errEl) {
        group.classList.remove('input-error');
        errEl.style.display = 'none';
        errEl.textContent = '';
    }

    usernameInput.addEventListener('input', () => clearError(groupUser, errUser));
    passwordInput.addEventListener('input', () => clearError(groupPass, errPass));

    /* ── Validação client-side leve ── */
    function showError(group, errEl, msg) {
        group.classList.add('input-error');
        errEl.textContent = msg;
        errEl.style.display = 'flex';
    }

    function validateForm() {
        let valid = true;

        if (!usernameInput.value.trim()) {
            showError(groupUser, errUser, 'Informe seu usuário ou email.');
            valid = false;
        }

        if (!passwordInput.value) {
            showError(groupPass, errPass, 'Informe sua senha.');
            valid = false;
        } else if (passwordInput.value.length < 4) {
            showError(groupPass, errPass, 'Senha muito curta.');
            valid = false;
        }

        if (!valid) {
            // Foca no primeiro campo com erro
            if (groupUser.classList.contains('input-error')) usernameInput.focus();
            else passwordInput.focus();
        }

        return valid;
    }

    /* ── Submissão: loading state ── */
    form.addEventListener('submit', (e) => {
        if (!validateForm()) {
            e.preventDefault();
            return;
        }

        btnSubmit.classList.add('loading');
        btnSubmit.disabled = true;
        btnSubmit.setAttribute('aria-label', 'Entrando…');

        /* Segurança: remove loading após 8s caso algo falhe silenciosamente */
        setTimeout(() => {
            btnSubmit.classList.remove('loading');
            btnSubmit.disabled = false;
            btnSubmit.setAttribute('aria-label', 'Entrar na conta');
        }, 8000);
    });

    /* ── Enter no campo usuário avança para senha ── */
    usernameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            passwordInput.focus();
        }
    });

})();
</script>

</body>
</html>
